%YAML 1.2
---
title: Driver for IMR_PL_Revision
maintainers:
  - User
type: driver
device_type: custom_ip

# The compatible string MUST match your component.xml VLNV
properties:
  compatible:
    - enum:
        - imr,IMR_PL_Revision-1.0

# These link your Vivado parameters to xparameters.h
config:
  - C_S00_AXI_BASEADDR
  - C_S00_AXI_HIGHADDR
  - C_REVISION_MAJOR
  - C_REVISION_MINOR
  - C_REVISION_TEST

required:
  - compatible
  - reg